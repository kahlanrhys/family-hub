<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Hub - Family Management App</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.294.0/umd/lucide.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState } = React;
        const { ChevronLeft, ChevronRight, X } = lucide;

        function FamilyManagementApp() {
            // TAB STATE
            const [activeTab, setActiveTab] = useState('calendar');

            // FAMILY MEMBERS
            const [familyMembers, setFamilyMembers] = useState(['Riza', 'RR', 'Rhys', 'Connor']);

            // ========== CALENDAR STATE ==========
            const [calendarMonth, setCalendarMonth] = useState(new Date(2026, 2, 1));
            const [events, setEvents] = useState([
                { id: 1, title: 'School Assembly', date: '2026-03-05', members: ['Rhys', 'Connor'], time: '09:00' },
                { id: 2, title: 'Doctor Appointment', date: '2026-03-08', members: ['Riza'], time: '14:00' },
                { id: 3, title: 'Soccer Game', date: '2026-03-12', members: ['Connor'], time: '16:00' },
                { id: 4, title: 'Family Dinner Night', date: '2026-03-14', members: ['Riza', 'RR', 'Rhys', 'Connor'], time: '18:00' },
            ]);
            const [selectedMembers, setSelectedMembers] = useState([]);
            const [filterFamilyOnly, setFilterFamilyOnly] = useState(false);
            const [showEventModal, setShowEventModal] = useState(false);
            const [editingEvent, setEditingEvent] = useState(null);
            const [eventForm, setEventForm] = useState({ title: '', date: '', time: '', members: [] });

            // ========== SHOPPING STATE ==========
            const [shoppingList, setShoppingList] = useState([
                { id: 1, item: 'Milk', category: 'Groceries', qty: 2, store: 'Tesco', checked: false },
                { id: 2, item: 'Bread', category: 'Groceries', qty: 1, store: 'Sainsbury\'s', checked: false },
                { id: 3, item: 'Eggs', category: 'Groceries', qty: 12, store: 'Tesco', checked: false },
            ]);
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [selectedStore, setSelectedStore] = useState(null);
            const [showShoppingModal, setShowShoppingModal] = useState(false);
            const [editingShoppingItem, setEditingShoppingItem] = useState(null);
            const [shoppingForm, setShoppingForm] = useState({ item: '', category: 'Groceries', qty: 1, store: 'Tesco' });
            const [customCategories] = useState(['Groceries', 'School Essentials', 'Health & Beauty', 'Technology', 'Furniture', 'Other']);
            const [customStores] = useState(['Tesco', 'Sainsbury\'s', 'Asda', 'Boots', 'WHSmith', 'Argos']);

            // ========== CHORES STATE ==========
            const [chores, setChores] = useState([
                { id: 1, task: 'Clean bedroom', assignee: 'Rhys', dueDate: '2026-03-06', completed: false },
                { id: 2, task: 'Wash dishes', assignee: 'Connor', dueDate: '2026-03-07', completed: false },
                { id: 3, task: 'Vacuum living room', assignee: 'RR', dueDate: '2026-03-08', completed: false },
                { id: 4, task: 'Do laundry', assignee: 'Riza', dueDate: '2026-03-09', completed: false },
            ]);
            const [choreView, setChoreView] = useState('list');
            const [selectedChoreFilter, setSelectedChoreFilter] = useState(null);
            const [showChoreModal, setShowChoreModal] = useState(false);
            const [editingChore, setEditingChore] = useState(null);
            const [choreForm, setChoreForm] = useState({ task: '', assignee: '', dueDate: '' });
            const [choresWeekStart, setChoresWeekStart] = useState(new Date());

            // ========== MEALS STATE ==========
            const [mealMonth, setMealMonth] = useState(new Date());
            const [meals, setMeals] = useState({
                '2026-03-10': { breakfast: 'Cereal', lunch: 'Sandwich', dinner: 'Pasta' },
                '2026-03-11': { breakfast: 'Eggs', lunch: 'Salad', dinner: 'Chicken' },
                '2026-03-12': { breakfast: 'Pancakes', lunch: 'Tacos', dinner: 'Pizza' },
            });
            const [showMealModal, setShowMealModal] = useState(false);
            const [editingMealDate, setEditingMealDate] = useState(null);
            const [editingMealType, setEditingMealType] = useState(null);
            const [mealForm, setMealForm] = useState({ breakfast: '', lunch: '', dinner: '' });

            // ========== RECIPES STATE ==========
            const [recipes, setRecipes] = useState([
                {
                    id: 1,
                    name: 'Chocolate Chip Cookies',
                    prepTime: '15 mins',
                    cookTime: '12 mins',
                    image: '🍪',
                    ingredients: [
                        { item: 'Flour', quantity: '2.25', unit: 'cups' },
                        { item: 'Butter', quantity: '1', unit: 'cup' },
                        { item: 'Sugar', quantity: '0.75', unit: 'cup' },
                        { item: 'Chocolate Chips', quantity: '2', unit: 'cups' },
                    ],
                    directions: [
                        'Preheat oven to 375°F.',
                        'Cream butter and sugar.',
                        'Mix in flour and chips.',
                        'Bake for 12 minutes.',
                    ],
                    isFavourite: true,
                },
                {
                    id: 2,
                    name: 'Spaghetti Carbonara',
                    prepTime: '10 mins',
                    cookTime: '15 mins',
                    image: '🍝',
                    ingredients: [
                        { item: 'Spaghetti', quantity: '1', unit: 'lb' },
                        { item: 'Pancetta', quantity: '6', unit: 'oz' },
                        { item: 'Eggs', quantity: '4', unit: 'whole' },
                        { item: 'Parmesan', quantity: '1', unit: 'cup' },
                    ],
                    directions: [
                        'Cook spaghetti.',
                        'Fry pancetta.',
                        'Mix eggs and cheese.',
                        'Combine all together.',
                    ],
                    isFavourite: false,
                },
            ]);
            const [recipeCurrentPage, setRecipeCurrentPage] = useState(0);
            const [showRecipeModal, setShowRecipeModal] = useState(false);
            const [editingRecipe, setEditingRecipe] = useState(null);
            const [recipeForm, setRecipeForm] = useState({
                name: '', prepTime: '', cookTime: '', image: '', ingredients: [], directions: [], isFavourite: false
            });

            // ========== PANTRY STATE ==========
            const [pantryItems, setPantryItems] = useState([
                { id: 1, name: 'All-Purpose Flour', quantity: 5, unit: 'lbs', location: 'Cabinet A', category: 'Baking Supplies' },
                { id: 2, name: 'Tomato Sauce (Canned)', quantity: 3, unit: 'cans', location: 'Pantry Shelf', category: 'Canned Goods' },
                { id: 3, name: 'Potato Chips', quantity: 1, unit: 'bag', location: 'Snack Cupboard', category: 'Snacks' },
                { id: 4, name: 'Pasta (Spaghetti)', quantity: 2, unit: 'boxes', location: 'Cabinet B', category: 'Grains/Pasta' },
                { id: 5, name: 'Cereal', quantity: 3, unit: 'boxes', location: 'Pantry Shelf', category: 'Breakfast' },
                { id: 6, name: 'Peanut Butter', quantity: 1, unit: 'jar', location: 'Cabinet C', category: 'Condiments' },
                { id: 7, name: 'Olive Oil', quantity: 1, unit: 'bottle', location: 'Cabinet C', category: 'Oils/Vinegars' },
                { id: 8, name: 'Orange Juice', quantity: 2, unit: 'liters', location: 'Fridge', category: 'Beverages' },
            ]);
            const [pantrySearchTerm, setPantrySearchTerm] = useState('');
            const [pantrySelectedCategory, setPantrySelectedCategory] = useState(null);
            const [showPantryModal, setShowPantryModal] = useState(false);
            const [editingPantryItem, setEditingPantryItem] = useState(null);
            const [pantryItemForm, setPantryItemForm] = useState({ name: '', quantity: '', unit: 'count', location: '', category: 'Snacks' });
            const [consumeItem, setConsumeItem] = useState(null);
            const [consumeAmount, setConsumeAmount] = useState('');
            const [showBarcodeScanner, setShowBarcodeScanner] = useState(false);
            const [scannedBarcode, setScannedBarcode] = useState('');
            const [pantryCategories] = useState(['Baking Supplies', 'Canned Goods', 'Snacks', 'Grains/Pasta', 'Breakfast', 'Condiments', 'Oils/Vinegars', 'Beverages']);

            // ========== GAMES STATE ==========
            const [games, setGames] = useState([
                { id: 1, title: 'Elden Ring', console: 'PlayStation 5', type: 'physical', location: 'Game Shelf', linkedAccount: null },
                { id: 2, title: 'The Legend of Zelda: Tears of the Kingdom', console: 'Nintendo Switch', type: 'physical', location: 'Game Shelf', linkedAccount: null },
                { id: 3, title: 'Halo Infinite', console: 'Xbox Series X', type: 'digital', location: null, linkedAccount: 'Family Account' },
                { id: 4, title: 'Super Mario Bros Wonder', console: 'Nintendo Switch', type: 'digital', location: null, linkedAccount: 'Connor Account' },
                { id: 5, title: 'God of War Ragnarök', console: 'PlayStation 5', type: 'physical', location: 'Game Shelf', linkedAccount: null },
                { id: 6, title: 'Starfield', console: 'Xbox Series X', type: 'physical', location: 'Media Cabinet', linkedAccount: null },
                { id: 7, title: 'Fortnite', console: 'Nintendo Switch', type: 'digital', location: null, linkedAccount: 'Family Account' },
                { id: 8, title: 'Final Fantasy XVI', console: 'PlayStation 5', type: 'physical', location: 'Game Shelf', linkedAccount: null },
            ]);
            const [gameSearchTerm, setGameSearchTerm] = useState('');
            const [selectedGameConsole, setSelectedGameConsole] = useState(null);
            const [showGameModal, setShowGameModal] = useState(false);
            const [editingGame, setEditingGame] = useState(null);
            const [gameForm, setGameForm] = useState({ title: '', console: 'PlayStation 5', type: 'physical', location: '', linkedAccount: '' });
            const [gameConsoles, setGameConsoles] = useState(['PlayStation 5', 'Xbox Series X', 'Nintendo Switch', 'PC', 'PlayStation 4', 'Xbox One']);
            const [showConsoleModal, setShowConsoleModal] = useState(false);
            const [newConsole, setNewConsole] = useState('');

            // ========== VACATION STATE ==========
            const [vacations, setVacations] = useState([
                {
                    id: 1,
                    name: 'Spring Break - Caribbean',
                    destination: 'Cancun, Mexico',
                    startDate: '2026-03-15',
                    endDate: '2026-03-22',
                    members: ['Riza', 'RR', 'Rhys', 'Connor'],
                    status: 'confirmed',
                    itinerary: [
                        { day: 1, activity: 'Arrive and check-in' },
                        { day: 2, activity: 'Beach day' },
                    ],
                    flights: 'American Airlines',
                    accommodation: 'Moon Palace Resort',
                    flightDetails: 'Departure: March 15 at 8:30 AM from London Heathrow | Return: March 22 at 3:45 PM',
                    accommodationDetails: 'All-Inclusive Beachfront Suite, 7 nights',
                },
                {
                    id: 2,
                    name: 'Easter Holiday - Portugal',
                    destination: 'Lisbon, Portugal',
                    startDate: '2026-04-05',
                    endDate: '2026-04-12',
                    members: ['Riza', 'RR', 'Rhys', 'Connor'],
                    status: 'planning',
                    itinerary: [],
                    flights: 'TAP Air Portugal',
                    accommodation: 'Memmo Alfama Hotel',
                    flightDetails: 'Departure: April 5 at 10:15 AM | Return: April 12 at 5:20 PM',
                    accommodationDetails: 'Boutique 4-star hotel, 7 nights',
                },
            ]);
            const [selectedVacationDetail, setSelectedVacationDetail] = useState(null);
            const [showVacationModal, setShowVacationModal] = useState(false);
            const [editingVacation, setEditingVacation] = useState(null);
            const [vacationForm, setVacationForm] = useState({
                name: '', destination: '', startDate: '', endDate: '', status: 'dreaming',
                flights: '', accommodation: '', flightDetails: '', accommodationDetails: '', itinerary: []
            });

            // ========== HELPER FUNCTIONS ==========
            const getDaysInMonth = (date) => new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            const getFirstDayOfMonth = (date) => new Date(date.getFullYear(), date.getMonth(), 1).getDay();

            // Barcode product database (common items)
            const barcodeDatabase = {
                '5901234123457': { name: 'Olive Oil', category: 'Oils/Vinegars', unit: 'bottle' },
                '4006381333931': { name: 'Pasta (Spaghetti)', category: 'Grains/Pasta', unit: 'boxes' },
                '5000112139471': { name: 'Rice (White)', category: 'Grains/Pasta', unit: 'lbs' },
                '5449000050127': { name: 'Coca Cola', category: 'Beverages', unit: 'cans' },
                '7622300061414': { name: 'Nestlé Coffee', category: 'Beverages', unit: 'bags' },
                '4006381333948': { name: 'Baking Powder', category: 'Baking Supplies', unit: 'cups' },
                '5010477349992': { name: 'Peanut Butter', category: 'Condiments', unit: 'jars' },
                '5449000131805': { name: 'Tomato Sauce', category: 'Canned Goods', unit: 'cans' },
                '5449000069412': { name: 'Black Beans', category: 'Canned Goods', unit: 'cans' },
                '5060120130304': { name: 'Cereal', category: 'Breakfast', unit: 'boxes' },
            };

            const handleBarcodeScanned = (barcode) => {
                const product = barcodeDatabase[barcode];
                if (product) {
                    setPantryItemForm({
                        name: product.name,
                        quantity: '1',
                        unit: product.unit,
                        location: '',
                        category: product.category
                    });
                    setScannedBarcode(barcode);
                    setShowBarcodeScanner(false);
                    setShowPantryModal(true);
                } else {
                    alert(`Product with barcode ${barcode} not found in database. Please enter details manually.`);
                    setPantryItemForm({ name: '', quantity: '', unit: 'count', location: '', category: 'Snacks' });
                    setScannedBarcode('');
                }
            };

            // Games helpers
            const openGameModal = (game = null) => {
                if (game) {
                    setGameForm({ title: game.title, console: game.console, type: game.type, location: game.location || '', linkedAccount: game.linkedAccount || '' });
                    setEditingGame(game.id);
                } else {
                    setGameForm({ title: '', console: 'PlayStation 5', type: 'physical', location: '', linkedAccount: '' });
                    setEditingGame(null);
                }
                setShowGameModal(true);
            };

            const saveGame = () => {
                if (!gameForm.title.trim() || !gameForm.console) {
                    alert('Please enter game title and console');
                    return;
                }
                if (gameForm.type === 'digital' && !gameForm.linkedAccount.trim()) {
                    alert('Please enter the linked account for digital games');
                    return;
                }
                if (gameForm.type === 'physical' && !gameForm.location.trim()) {
                    alert('Please enter the storage location for physical games');
                    return;
                }

                if (editingGame) {
                    setGames(games.map(g =>
                        g.id === editingGame ? { ...g, ...gameForm } : g
                    ));
                } else {
                    const newGame = {
                        id: Math.max(...games.map(g => g.id), 0) + 1,
                        ...gameForm
                    };
                    setGames([...games, newGame]);
                }
                setShowGameModal(false);
            };

            const deleteGame = (id) => {
                if (window.confirm('Delete this game?')) {
                    setGames(games.filter(g => g.id !== id));
                    setShowGameModal(false);
                }
            };

            const addConsole = () => {
                if (newConsole.trim() && !gameConsoles.includes(newConsole.trim())) {
                    setGameConsoles([...gameConsoles, newConsole.trim()]);
                    setNewConsole('');
                }
            };

            const removeConsole = (console) => {
                if (window.confirm(`Remove "${console}"? Games on this console will need to be reassigned.`)) {
                    setGameConsoles(gameConsoles.filter(c => c !== console));
                    setGames(games.filter(g => g.console !== console));
                }
            };

            // Calendar helpers
            const toggleMember = (member) => {
                setSelectedMembers(prev =>
                    prev.includes(member) ? prev.filter(m => m !== member) : [...prev, member]
                );
            };

            const openEventModal = (dateStr) => {
                setEventForm({ title: '', date: dateStr, time: '', members: [] });
                setEditingEvent(null);
                setShowEventModal(true);
            };

            const saveEvent = () => {
                if (!eventForm.title.trim()) {
                    alert('Please enter event title');
                    return;
                }
                if (editingEvent) {
                    setEvents(events.map(e => e.id === editingEvent ? { ...e, ...eventForm } : e));
                } else {
                    const newEvent = { id: Math.max(...events.map(e => e.id), 0) + 1, ...eventForm };
                    setEvents([...events, newEvent]);
                }
                setShowEventModal(false);
            };

            const deleteEvent = (id) => {
                if (window.confirm('Delete this event?')) {
                    setEvents(events.filter(e => e.id !== id));
                    setShowEventModal(false);
                }
            };

            // Shopping helpers
            const openShoppingModal = (item = null) => {
                if (item) {
                    setShoppingForm({ item: item.item, category: item.category, qty: item.qty, store: item.store });
                    setEditingShoppingItem(item.id);
                } else {
                    setShoppingForm({ item: '', category: 'Groceries', qty: 1, store: 'Tesco' });
                    setEditingShoppingItem(null);
                }
                setShowShoppingModal(true);
            };

            const saveShoppingItem = () => {
                if (!shoppingForm.item.trim()) {
                    alert('Please enter item name');
                    return;
                }
                if (editingShoppingItem) {
                    setShoppingList(shoppingList.map(item =>
                        item.id === editingShoppingItem ? { ...item, ...shoppingForm } : item
                    ));
                } else {
                    const newItem = {
                        id: Math.max(...shoppingList.map(i => i.id), 0) + 1,
                        ...shoppingForm,
                        checked: false
                    };
                    setShoppingList([...shoppingList, newItem]);
                }
                setShowShoppingModal(false);
            };

            const deleteShoppingItem = (id) => {
                if (window.confirm('Delete this item?')) {
                    setShoppingList(shoppingList.filter(item => item.id !== id));
                    setShowShoppingModal(false);
                }
            };

            // Chores helpers
            const toggleChoreCompleted = (id) => {
                setChores(chores.map(chore =>
                    chore.id === id ? { ...chore, completed: !chore.completed } : chore
                ));
            };

            const openChoreModal = (chore = null) => {
                if (chore) {
                    setChoreForm({ task: chore.task, assignee: chore.assignee, dueDate: chore.dueDate });
                    setEditingChore(chore.id);
                } else {
                    setChoreForm({ task: '', assignee: familyMembers[0], dueDate: '' });
                    setEditingChore(null);
                }
                setShowChoreModal(true);
            };

            const saveChore = () => {
                if (!choreForm.task.trim() || !choreForm.assignee || !choreForm.dueDate) {
                    alert('Please fill all fields');
                    return;
                }
                if (editingChore) {
                    setChores(chores.map(c =>
                        c.id === editingChore ? { ...c, ...choreForm } : c
                    ));
                } else {
                    const newChore = {
                        id: Math.max(...chores.map(c => c.id), 0) + 1,
                        ...choreForm,
                        completed: false
                    };
                    setChores([...chores, newChore]);
                }
                setShowChoreModal(false);
            };

            const deleteChore = (id) => {
                if (window.confirm('Delete this chore?')) {
                    setChores(chores.filter(c => c.id !== id));
                    setShowChoreModal(false);
                }
            };

            // Meals helpers
            const openMealModal = (day, mealType = null, dateStr = null) => {
                if (!dateStr) {
                    dateStr = `2026-03-${String(day).padStart(2, '0')}`;
                }
                const dayMeals = meals[dateStr] || { breakfast: '', lunch: '', dinner: '' };
                if (mealType) {
                    setMealForm({ breakfast: mealType === 'breakfast' ? dayMeals.breakfast : '', lunch: mealType === 'lunch' ? dayMeals.lunch : '', dinner: mealType === 'dinner' ? dayMeals.dinner : '' });
                    setEditingMealType(mealType);
                } else {
                    setMealForm(dayMeals);
                    setEditingMealType(null);
                }
                setEditingMealDate(dateStr);
                setShowMealModal(true);
            };

            const saveMeal = () => {
                if (editingMealType && !mealForm[editingMealType].trim()) {
                    alert('Please enter a meal');
                    return;
                }
                if (editingMealType) {
                    setMeals({
                        ...meals,
                        [editingMealDate]: { ...meals[editingMealDate] || { breakfast: '', lunch: '', dinner: '' }, [editingMealType]: mealForm[editingMealType] }
                    });
                } else {
                    setMeals({ ...meals, [editingMealDate]: mealForm });
                }
                setShowMealModal(false);
            };

            const deleteMeal = () => {
                if (editingMealType) {
                    setMeals({
                        ...meals,
                        [editingMealDate]: { ...meals[editingMealDate] || { breakfast: '', lunch: '', dinner: '' }, [editingMealType]: '' }
                    });
                } else {
                    const newMeals = { ...meals };
                    delete newMeals[editingMealDate];
                    setMeals(newMeals);
                }
                setShowMealModal(false);
            };

            // Recipes helpers
            const toggleRecipeFavourite = (id) => {
                setRecipes(recipes.map(r =>
                    r.id === id ? { ...r, isFavourite: !r.isFavourite } : r
                ));
            };

            const openRecipeModal = (recipe = null) => {
                if (recipe) {
                    setRecipeForm({
                        name: recipe.name,
                        prepTime: recipe.prepTime,
                        cookTime: recipe.cookTime,
                        image: recipe.image,
                        ingredients: [...recipe.ingredients],
                        directions: [...recipe.directions],
                        isFavourite: recipe.isFavourite
                    });
                    setEditingRecipe(recipe.id);
                } else {
                    setRecipeForm({ name: '', prepTime: '', cookTime: '', image: '', ingredients: [], directions: [], isFavourite: false });
                    setEditingRecipe(null);
                }
                setShowRecipeModal(true);
            };

            const saveRecipe = () => {
                if (!recipeForm.name.trim()) {
                    alert('Please enter recipe name');
                    return;
                }
                if (editingRecipe) {
                    setRecipes(recipes.map(r =>
                        r.id === editingRecipe ? { ...r, ...recipeForm } : r
                    ));
                } else {
                    const newRecipe = {
                        id: Math.max(...recipes.map(r => r.id), 0) + 1,
                        ...recipeForm
                    };
                    setRecipes([...recipes, newRecipe]);
                }
                setShowRecipeModal(false);
            };

            const deleteRecipe = (id) => {
                if (window.confirm('Delete this recipe?')) {
                    setRecipes(recipes.filter(r => r.id !== id));
                    setShowRecipeModal(false);
                }
            };

            // Pantry helpers
            const openPantryModal = (item = null) => {
                if (item) {
                    setPantryItemForm({ name: item.name, quantity: item.quantity, unit: item.unit, location: item.location, category: item.category });
                    setEditingPantryItem(item.id);
                } else {
                    setPantryItemForm({ name: '', quantity: '', unit: 'count', location: '', category: 'Snacks' });
                    setEditingPantryItem(null);
                }
                setShowPantryModal(true);
            };

            const savePantryItem = () => {
                if (!pantryItemForm.name.trim() || !pantryItemForm.quantity || !pantryItemForm.location.trim()) {
                    alert('Please fill all fields');
                    return;
                }
                if (editingPantryItem) {
                    setPantryItems(pantryItems.map(item =>
                        item.id === editingPantryItem ? { ...item, ...pantryItemForm, quantity: parseFloat(pantryItemForm.quantity) } : item
                    ));
                } else {
                    const newItem = {
                        id: Math.max(...pantryItems.map(i => i.id), 0) + 1,
                        ...pantryItemForm,
                        quantity: parseFloat(pantryItemForm.quantity)
                    };
                    setPantryItems([...pantryItems, newItem]);
                }
                setShowPantryModal(false);
            };

            const deletePantryItem = (id) => {
                if (window.confirm('Delete this item?')) {
                    setPantryItems(pantryItems.filter(item => item.id !== id));
                    setShowPantryModal(false);
                }

                            onChange: (e) => setPantrySearchTerm(e.target.value),
                            className: 'w-full px-4 py-2 border border-purple-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300'
                        }),
                        React.createElement('div', { className: 'flex flex-wrap gap-2' },
                            React.createElement('button', {
                                onClick: () => setPantrySelectedCategory(null),
                                className: `px-4 py-2 rounded-full ${pantrySelectedCategory === null ? 'bg-purple-500 text-white' : 'bg-blue-100'}`
                            }, 'All'),
                            pantryCategories.map(category => React.createElement('button', {
                                key: category,
                                onClick: () => setPantrySelectedCategory(pantrySelectedCategory === category ? null : category),
                                className: `px-4 py-2 rounded-full ${pantrySelectedCategory === category ? 'bg-purple-500 text-white' : 'bg-blue-100'}`
                            }, category))
                        )
                    ),
                    Object.keys(groupedByCategory).length === 0
                        ? React.createElement('p', { className: 'text-gray-500 text-center py-8' }, 'No items found')
                        : React.createElement('div', { className: 'space-y-6' },
                            Object.entries(groupedByCategory).map(([category, items]) => React.createElement('div', {
                                key: category
                            },
                                React.createElement('h3', { className: 'text-lg font-bold text-purple-800 mb-3' }, category),
                                React.createElement('div', { className: 'space-y-2' },
                                    items.map(item => React.createElement('div', {
                                        key: item.id,
                                        className: 'bg-white rounded-lg p-4 border border-purple-100 shadow-sm'
                                    },
                                        React.createElement('div', { className: 'flex justify-between items-start mb-3' },
                                            React.createElement('div', { className: 'flex-1' },
                                                React.createElement('h4', { className: 'font-semibold text-gray-800' }, item.name),
                                                React.createElement('p', { className: 'text-sm text-gray-600' }, `📍 ${item.location}`)
                                            ),
                                            React.createElement('span', { className: 'bg-pink-200 text-purple-800 px-3 py-1 rounded-full font-semibold text-sm' }, `${item.quantity} ${item.unit}`)
                                        ),
                                        React.createElement('div', { className: 'flex gap-2' },
                                            React.createElement('button', {
                                                onClick: () => setConsumeItem(item.id),
                                                className: 'flex-1 bg-green-300 hover:bg-green-400 text-green-800 font-semibold py-1 rounded text-sm'
                                            }, '✓ Consume'),
                                            React.createElement('button', {
                                                onClick: () => openPantryModal(item),
                                                className: 'flex-1 bg-blue-300 hover:bg-blue-400 text-blue-800 font-semibold py-1 rounded text-sm'
                                            }, '✏️ Edit'),
                                            React.createElement('button', {
                                                onClick: () => deletePantryItem(item.id),
                                                className: 'flex-1 bg-red-300 hover:bg-red-400 text-red-800 font-semibold py-1 rounded text-sm'
                                            }, '🗑️ Delete')
                                        )
                                    ))
                                )
                            ))
                        )
                );
            };

            // Games Tab
            const GamesTab = () => {
                const filteredGames = games
                    .filter(game => {
                        const matchesSearch = game.title.toLowerCase().includes(gameSearchTerm.toLowerCase());
                        const matchesConsole = !selectedGameConsole || game.console === selectedGameConsole;
                        return matchesSearch && matchesConsole;
                    })
                    .sort((a, b) => a.console.localeCompare(b.console));

                const groupedByConsole = {};
                filteredGames.forEach(game => {
                    if (!groupedByConsole[game.console]) groupedByConsole[game.console] = [];
                    groupedByConsole[game.console].push(game);
                });

                return React.createElement('div', { className: 'space-y-6' },
                    React.createElement('div', { className: 'flex justify-between items-center' },
                        React.createElement('h2', { className: 'text-2xl font-bold text-purple-800' }, 'Game Library'),
                        React.createElement('div', { className: 'flex gap-2' },
                            React.createElement('button', {
                                onClick: () => setShowConsoleModal(true),
                                className: 'px-4 py-2 bg-blue-200 hover:bg-blue-300 rounded-lg'
                            }, '⚙️ Manage Consoles'),
                            React.createElement('button', {
                                onClick: () => openGameModal(),
                                className: 'px-4 py-2 bg-pink-200 hover:bg-pink-300 rounded-lg'
                            }, '+ Add Game')
                        )
                    ),
                    React.createElement('div', { className: 'space-y-4' },
                        React.createElement('input', {
                            type: 'text',
                            placeholder: 'Search games...',
                            value: gameSearchTerm,
                            onChange: (e) => setGameSearchTerm(e.target.value),
                            className: 'w-full px-4 py-2 border border-purple-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-300'
                        }),
                        React.createElement('div', { className: 'flex flex-wrap gap-2' },
                            React.createElement('button', {
                                onClick: () => setSelectedGameConsole(null),
                                className: `px-4 py-2 rounded-full font-medium transition ${selectedGameConsole === null ? 'bg-purple-500 text-white' : 'bg-blue-100 text-purple-700'}`
                            }, 'All Consoles'),
                            gameConsoles.map(console => React.createElement('button', {
                                key: console,
                                onClick: () => setSelectedGameConsole(selectedGameConsole === console ? null : console),
                                className: `px-4 py-2 rounded-full font-medium transition ${selectedGameConsole === console ? 'bg-purple-500 text-white' : 'bg-blue-100 text-purple-700'}`
                            }, console))
                        )
                    ),
                    Object.keys(groupedByConsole).length === 0
                        ? React.createElement('p', { className: 'text-gray-500 text-center py-8' }, 'No games found')
                        : React.createElement('div', { className: 'space-y-6' },
                            Object.entries(groupedByConsole).map(([console, consoleGames]) => React.createElement('div', {
                                key: console
                            },
                                React.createElement('h3', { className: 'text-lg font-bold text-purple-800 mb-3' }, `🎮 ${console}`),
                                React.createElement('div', { className: 'space-y-2' },
                                    consoleGames.map(game => React.createElement('div', {
                                        key: game.id,
                                        className: 'bg-white rounded-lg p-4 border border-purple-100 shadow-sm'
                                    },
                                        React.createElement('div', { className: 'flex justify-between items-start mb-3' },
                                            React.createElement('div', { className: 'flex-1' },
                                                React.createElement('h4', { className: 'font-semibold text-gray-800' }, game.title),
                                                React.createElement('div', { className: 'flex gap-3 mt-2' },
                                                    React.createElement('span', {
                                                        className: `text-xs px-2 py-1 rounded-full font-semibold ${game.type === 'digital' ? 'bg-blue-200 text-blue-800' : 'bg-orange-200 text-orange-800'}`
                                                    }, game.type === 'digital' ? '💾 Digital' : '💿 Physical'),
                                                    React.createElement('span', { className: 'text-xs px-2 py-1 rounded-full bg-gray-200 text-gray-800 font-semibold' },
                                                        game.type === 'digital' ? `📱 ${game.linkedAccount}` : `📍 ${game.location}`)
                                                )
                                            )
                                        ),
                                        React.createElement('div', { className: 'flex gap-2' },
                                            React.createElement('button', {
                                                onClick: () => openGameModal(game),
                                                className: 'flex-1 bg-blue-300 hover:bg-blue-400 text-blue-800 font-semibold py-1 rounded text-sm'
                                            }, '✏️ Edit'),
                                            React.createElement('button', {
                                                onClick: () => deleteGame(game.id),
                                                className: 'flex-1 bg-red-300 hover:bg-red-400 text-red-800 font-semibold py-1 rounded text-sm'
                                            }, '🗑️ Delete')
                                        )
                                    ))
                                )
                            ))
                        )
                );
            };

            // Vacations Tab
            const VacationTab = () => {
                const getStatusColor = (status) => {
                    switch(status) {
                        case 'confirmed': return 'bg-green-100 text-green-700';
                        case 'planning': return 'bg-blue-100 text-blue-700';
                        case 'dreaming': return 'bg-purple-100 text-purple-700';
                        default: return 'bg-gray-100';
                    }
                };

                return React.createElement('div', { className: 'space-y-6' },
                    React.createElement('div', { className: 'flex justify-between items-center' },
                        React.createElement('h2', { className: 'text-2xl font-bold text-purple-800' }, 'Vacation Planner'),
                        React.createElement('button', {
                            onClick: () => openVacationModal(),
                            className: 'px-4 py-2 bg-pink-200 hover:bg-pink-300 rounded-lg'
                        }, '+ Plan Vacation')
                    ),
                    React.createElement('div', { className: 'bg-white rounded-2xl shadow-sm border border-pink-100 p-6' },
                        React.createElement('h3', { className: 'text-lg font-bold text-purple-800 mb-4' }, 'Vacation Calendar'),
                        React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4' },
                            vacations.map(vacation => {
                                const startDate = new Date(vacation.startDate);
                                const endDate = new Date(vacation.endDate);
                                const duration = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;

                                return React.createElement('div', {
                                    key: vacation.id,
                                    onClick: () => setSelectedVacationDetail(vacation.id),
                                    className: `rounded-xl p-4 border-2 cursor-pointer transition ${
                                        selectedVacationDetail === vacation.id ? 'bg-pink-50 border-pink-400 shadow-md' : 'bg-gradient-to-br from-orange-50 to-pink-50 border-pink-200 hover:shadow-md'
                                    } ${getStatusColor(vacation.status)}`
                                },
                                    React.createElement('div', { className: 'flex justify-between items-start mb-2' },
                                        React.createElement('h4', { className: 'font-bold text-gray-800' }, vacation.name)
                                    ),
                                    React.createElement('p', { className: 'text-sm text-gray-700 mb-2' }, vacation.destination),
                                    React.createElement('div', { className: 'flex justify-between items-center text-xs text-gray-600' },
                                        React.createElement('span', {}, `📅 ${startDate.toLocaleDateString()}`),
                                        React.createElement('span', { className: 'font-semibold' }, `${duration} days`)
                                    )
                                );
                            })
                        )
                    ),
                    selectedVacationDetail && React.createElement('div', {
                        className: 'bg-gradient-to-br from-orange-50 to-pink-50 rounded-2xl p-6 border border-pink-200 shadow-md'
                    },
                        vacations
                            .filter(v => v.id === selectedVacationDetail)
                            .map(vacation => {
                                const startDate = new Date(vacation.startDate);
                                const endDate = new Date(vacation.endDate);
                                const duration = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;

                                return React.createElement('div', { key: vacation.id },
                                    React.createElement('div', { className: 'flex justify-between items-start mb-4' },
                                        React.createElement('div', {},
                                            React.createElement('h3', { className: 'text-2xl font-bold text-purple-800' }, vacation.name),
                                            React.createElement('p', { className: 'text-purple-600 mt-1' }, vacation.destination)
                                        ),
                                        React.createElement('div', { className: 'flex gap-2' },
                                            React.createElement('button', {
                                                onClick: () => openVacationModal(vacation),
                                                className: 'text-blue-500 hover:text-blue-700'
                                            }, '✏️ Edit'),
                                            React.createElement('button', {
                                                onClick: () => deleteVacation(vacation.id),
                                                className: 'text-red-500 hover:text-red-700'
                                            }, '🗑️ Delete')
                                        )
                                    ),
                                    React.createElement('div', { className: 'grid grid-cols-2 gap-4 mb-6' },
                                        React.createElement('div', { className: 'bg-white rounded-lg p-4' },
                                            React.createElement('p', { className: 'text-xs text-gray-600' }, 'Dates'),
                                            React.createElement('p', { className: 'font-semibold' }, startDate.toLocaleDateString()),
                                            React.createElement('p', { className: 'text-xs' }, `to ${endDate.toLocaleDateString()}`),
                                            React.createElement('p', { className: 'text-sm text-purple-600 font-semibold mt-2' }, `${duration} days`)
                                        ),
                                        React.createElement('div', { className: 'bg-white rounded-lg p-4' },
                                            React.createElement('p', { className: 'text-xs text-gray-600' }, 'Status'),
                                            React.createElement('p', { className: 'font-semibold capitalize' }, vacation.status)
                                        )
                                    ),
                                    React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-4' },
                                        React.createElement('div', { className: 'bg-white rounded-lg p-4' },
                                            React.createElement('p', { className: 'text-xs text-gray-600 mb-2' }, '✈️ Flights'),
                                            React.createElement('p', { className: 'font-semibold' }, vacation.flights),
                                            React.createElement('p', { className: 'text-sm text-gray-600 mt-2' }, vacation.flightDetails)
                                        ),
                                        React.createElement('div', { className: 'bg-white rounded-lg p-4' },
                                            React.createElement('p', { className: 'text-xs text-gray-600 mb-2' }, '🏨 Accommodation'),
                                            React.createElement('p', { className: 'font-semibold' }, vacation.accommodation),
                                            React.createElement('p', { className: 'text-sm text-gray-600 mt-2' }, vacation.accommodationDetails)
                                        )
                                    )
                                );
                            })
                    )
                );
            };

            // Search Tab
            const SearchTab = () => React.createElement('div', { className: 'space-y-6' },
                React.createElement('h2', { className: 'text-2xl font-bold text-purple-800' }, 'Holiday Planning Search'),
                React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-4' },
                    React.createElement('div', { className: 'bg-gradient-to-br from-blue-100 to-white rounded-xl p-6 border border-purple-100 cursor-pointer hover:shadow-md' },
                        React.createElement('p', { className: 'text-4xl mb-3' }, '✈️'),
                        React.createElement('h3', { className: 'font-semibold text-gray-800' }, 'Flight Comparison'),
                        React.createElement('p', { className: 'text-sm text-gray-600' }, 'Expedia, Kayak, Google Flights')
                    ),
                    React.createElement('div', { className: 'bg-gradient-to-br from-purple-100 to-white rounded-xl p-6 border border-purple-100 cursor-pointer hover:shadow-md' },
                        React.createElement('p', { className: 'text-4xl mb-3' }, '🏨'),
                        React.createElement('h3', { className: 'font-semibold text-gray-800' }, 'Accommodations'),
                        React.createElement('p', { className: 'text-sm text-gray-600' }, 'Booking.com, Airbnb, Hotels.com')
                    ),
                    React.createElement('div', { className: 'bg-gradient-to-br from-pink-100 to-white rounded-xl p-6 border border-purple-100 cursor-pointer hover:shadow-md' },
                        React.createElement('p', { className: 'text-4xl mb-3' }, '🍽️'),
                        React.createElement('h3', { className: 'font-semibold text-gray-800' }, 'Restaurants'),
                        React.createElement('p', { className: 'text-sm text-gray-600' }, 'TripAdvisor, Yelp, Google Maps')
                    ),
                    React.createElement('div', { className: 'bg-gradient-to-br from-green-100 to-white rounded-xl p-6 border border-purple-100 cursor-pointer hover:shadow-md' },
                        React.createElement('p', { className: 'text-4xl mb-3' }, '🗺️'),
                        React.createElement('h3', { className: 'font-semibold text-gray-800' }, 'Destinations'),
                        React.createElement('p', { className: 'text-sm text-gray-600' }, 'Lonely Planet, Viator, GetYourGuide')
                    )
                )
            );

            return React.createElement('div', {
                style: { fontFamily: '"Century Gothic", "Trebuchet MS", sans-serif' },
                className: 'min-h-screen bg-gradient-to-br from-blue-100 via-purple-50 to-pink-100'
            },
                React.createElement('div', { className: 'bg-gradient-to-r from-purple-300 via-pink-200 to-blue-200 shadow-lg' },
                    React.createElement('div', { className: 'max-w-7xl mx-auto px-6 py-8' },
                        React.createElement('h1', { className: 'text-4xl font-bold text-purple-900' }, 'Family Hub'),
                        React.createElement('p', { className: 'text-purple-700 mt-1' }, 'Manage everything for Riza, RR, Rhys & Connor')
                    )
                ),
                React.createElement('div', { className: 'bg-white border-b border-purple-100 shadow-sm sticky top-0 z-10' },
                    React.createElement('div', { className: 'max-w-7xl mx-auto px-6' },
                        React.createElement('div', { className: 'flex gap-1 overflow-x-auto' },
                            [
                                { id: 'calendar', icon: '📅', label: 'Calendar' },
                                { id: 'shopping', icon: '🛒', label: 'Shopping' },
                                { id: 'chores', icon: '✓', label: 'Chores' },
                                { id: 'meals', icon: '🍽️', label: 'Meals' },
                                { id: 'recipes', icon: '📖', label: 'Recipes' },
                                { id: 'pantry', icon: '🥫', label: 'Pantry' },
                                { id: 'games', icon: '🎮', label: 'Games' },
                                { id: 'vacation', icon: '✈️', label: 'Vacations' },
                                { id: 'search', icon: '🔍', label: 'Search' },
                            ].map(tab => React.createElement('button', {
                                key: tab.id,
                                onClick: () => setActiveTab(tab.id),
                                className: `px-6 py-4 font-semibold transition whitespace-nowrap ${
                                    activeTab === tab.id
                                        ? 'border-b-4 border-pink-400 text-purple-800 bg-gradient-to-b from-pink-50 to-transparent'
                                        : 'text-gray-600 hover:text-purple-700 hover:bg-purple-50'
                                }`
                            },
                                React.createElement('span', { className: 'mr-2' }, tab.icon),
                                tab.label
                            ))
                        )
                    )
                ),
                React.createElement('div', { className: 'max-w-7xl mx-auto px-6 py-8' },
                    activeTab === 'calendar' && React.createElement(CalendarTab),
                    activeTab === 'shopping' && React.createElement(ShoppingTab),
                    activeTab === 'chores' && React.createElement(ChoresTab),
                    activeTab === 'meals' && React.createElement(MealTab),
                    activeTab === 'recipes' && React.createElement(RecipeTab),
                    activeTab === 'pantry' && React.createElement(PantryTab),
                    activeTab === 'games' && React.createElement(GamesTab),
                    activeTab === 'vacation' && React.createElement(VacationTab),
                    activeTab === 'search' && React.createElement(SearchTab)
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(FamilyManagementApp));
    </script>
</body>
</html>
