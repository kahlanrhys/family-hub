            const newEvent = { id: Math.max(...events.map(e => e.id), 0) + 1, ...eventForm };
            setEvents([...events, newEvent]);

        setShowEventModal(false);
    };

    const deleteEvent = (id) => {
        if (window.confirm('Delete this event?')) {
            setEvents(events.filter(e => e.id !== id));
            setShowEventModal(false);
        }
    };

    const openShoppingModal = (item = null) => {
        if (item) {
            setShoppingForm({ item: item.item, category: item.category, qty: item.qty, store: item.store });
            setEditingShoppingItem(item.id);
        } else {
            setShoppingForm({ item: '', category: 'Groceries', qty: 1, store: 'Tesco' });
            setEditingShoppingItem(null);

    const saveShoppingItem = () => {

    const toggleChoreCompleted = (id) => {
        setChores(chores.map(chore => chore.id === id ? { ...chore, completed: !chore.completed } : chore));
    };

    const openChoreModal = (chore = null) => {
        if (chore) {
            setChoreForm({ task: chore.task, assignee: chore.assignee, dueDate: chore.dueDate });
            setEditingChore(chore.id);
        } else {
            setChoreForm({ task: '', assignee: familyMembers[0], dueDate: '' });
            setEditingChore(null);
        }
        setShowChoreModal(true);
    };

    const saveChore = () => {
        if (!choreForm.task.trim() || !choreForm.assignee || !choreForm.dueDate) { alert('Please fill all fields'); return; }
        if (editingChore) {
            setChores(chores.map(c => c.id === editingChore ? { ...c, ...choreForm } : c));
        } else {
            const newChore = { id: Math.max(...chores.map(c => c.id), 0) + 1, ...choreForm, completed: false };
            setChores([...chores, newChore]);
        }
        setShowChoreModal(false);
    };

    const deleteChore = (id) => {
        if (window.confirm('Delete this chore?')) {
            setChores(chores.filter(c => c.id !== id));
            setShowChoreModal(false);
        }
    };

    const openPantryModal = (item = null) => {
        if (item) {
            setPantryItemForm({ name: item.name, quantity: item.quantity, unit: item.unit, location: item.location, category: item.category });
            setEditingPantryItem(item.id);
        } else {
            setPantryItemForm({ name: '', quantity: '', unit: 'count', location: '', category: 'Snacks' });
            setEditingPantryItem(null);
        }
        setShowPantryModal(true);
    };

    const savePantryItem = () => {
        if (!pantryItemForm.name.trim() || !pantryItemForm.quantity || !pantryItemForm.location.trim()) { alert('Please fill all fields'); return; }
        if (editingPantryItem) {
            setPantryItems(pantryItems.map(item => item.id === editingPantryItem ? { ...item, ...pantryItemForm, quantity: parseFloat(pantryItemForm.quantity) } : item));
        } else {
            const newItem = { id: Math.max(...pantryItems.map(i => i.id), 0) + 1, ...pantryItemForm, quantity: parseFloat(pantryItemForm.quantity) };
            setPantryItems([...pantryItems, newItem]);
        }
        setShowPantryModal(false);
    };

    const deletePantryItem = (id) => {
        if (window.confirm('Delete this item?')) {
            setPantryItems(pantryItems.filter(item => item.id !== id));
            setShowPantryModal(false);
        }
    };

    const consumePantryItem = (id, amount) => {
        if (!amount || isNaN(amount) || amount <= 0) { alert('Please enter a valid amount'); return; }
        setPantryItems(pantryItems.map(item => item.id === id ? { ...item, quantity: Math.max(0, item.quantity - parseFloat(amount)) } : item));
        setConsumeItem(null);
        setConsumeAmount('');
    };

    const openGameModal = (game = null) => {
        if (game) {
            setGameForm({ title: game.title, console: game.console, type: game.type, location: game.location || '', linkedAccount: game.linkedAccount || '' });
            setEditingGame(game.id);
        } else {
            setGameForm({ title: '', console: 'PlayStation 5', type: 'physical', location: '', linkedAccount: '' });
            setEditingGame(null);
        }
        setShowGameModal(true);
    };

    const saveGame = () => {
        if (!gameForm.title.trim() || !gameForm.console) { alert('Please enter game title and console'); return; }
        if (gameForm.type === 'digital' && !gameForm.linkedAccount.trim()) { alert('Please enter the linked account for digital games'); return; }
        if (gameForm.type === 'physical' && !gameForm.location.trim()) { alert('Please enter the storage location for physical games'); return; }
        if (editingGame) {
            setGames(games.map(g => g.id === editingGame ? { ...g, ...gameForm } : g));
        } else {
            const newGame = { id: Math.max(...games.map(g => g.id), 0) + 1, ...gameForm };
            setGames([...games, newGame]);
        }
        setShowGameModal(false);
    };

    const deleteGame = (id) => {
        if (window.confirm('Delete this game?')) {
            setGames(games.filter(g => g.id !== id));
            setShowGameModal(false);
        }
    };

    const addConsole = () => {
        if (newConsole.trim() && !gameConsoles.includes(newConsole.trim())) {
            setGameConsoles([...gameConsoles, newConsole.trim()]);
            setNewConsole('');
        }
    };

    const removeConsole = (console) => {
        if (window.confirm(`Remove "${console}"? Games on this console will need to be reassigned.`)) {
            setGameConsoles(gameConsoles.filter(c => c !== console));
            setGames(games.filter(g => g.console !== console));
        }

        const firstDay = getFirstDayOfMonth(calendarMonth);
        const calendarDays = [];
        for (let i = 0; i < firstDay; i++) calendarDays.push(null);
        for (let i = 1; i <= daysInMonth; i++) calendarDays.push(i);

        const getEventsForDate = (day) => {
            const dateStr = `2026-03-${String(day).padStart(2, '0')}`;
            return events.filter(event => {
                if (event.date !== dateStr) return false;
                const isFamilyEvent = event.members.length === 4 && event.members.every(m => familyMembers.includes(m));
                if (filterFamilyOnly && !isFamilyEvent) return false;
                if (selectedMembers.length === 0) return true;
                return event.members.some(member => selectedMembers.includes(member));
            });
        };

                React.createElement('button', { onClick: () => setFilterFamilyOnly(!filterFamilyOnly), className: `px-4 py-2 rounded-full ${filterFamilyOnly ? 'bg-purple-500 text-white' : 'bg-blue-100'}` }, 'Family Only')
            ),
            React.createElement('div', { className: 'grid grid-cols-7 gap-2' },
                ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => React.createElement('div', { key: day, className: 'text-center font-semibold text-purple-600 py-2' }, day)),
                calendarDays.map((day, i) => {

                        key: i,
                        onClick: () => day && openEventModal(`2026-03-${String(day).padStart(2, '0')}`),
                        className: `min-h-24 rounded-lg p-2 border ${day ? 'bg-gradient-to-br from-blue-50 to-purple-50 border-purple-100 hover:shadow-md cursor-pointer' : 'bg-gray-50'}`

                        day && React.createElement(React.Fragment, {},
                            React.createElement('p', { className: 'font-bold text-gray-800' }, day),
                            dayEvents.slice(0, 2).map(event => React.createElement('p', { key: event.id, className: 'text-xs bg-pink-200 text-purple-800 rounded px-1 mt-1 truncate' }, event.title)),
                            dayEvents.length > 2 && React.createElement('p', { className: 'text-xs text-purple-600' }, `+${dayEvents.length - 2} more`)
                        )
                    );
                })
            ),
            showEventModal && React.createElement('div', { className: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4' },
                React.createElement('div', { className: 'bg-white rounded-2xl shadow-2xl max-w-md w-full p-6' },
                    React.createElement('div', { className: 'flex justify-between items-center mb-4' },
                        React.createElement('h3', { className: 'text-xl font-bold text-purple-800' }, editingEvent ? 'Edit Event' : 'Add Event'),
                        React.createElement('button', { onClick: () => setShowEventModal(false), className: 'text-gray-400 hover:text-gray-600' }, '✕')
                    ),
                    React.createElement('div', { className: 'space-y-4' },
                        React.createElement('input', { type: 'text', value: eventForm.title, onChange: (e) => setEventForm({ ...eventForm, title: e.target.value }), className: 'w-full px-4 py-2 border border-purple-200 rounded-lg', placeholder: 'Event title', autoFocus: true }),
                        React.createElement('input', { type: 'date', value: eventForm.date, onChange: (e) => setEventForm({ ...eventForm, date: e.target.value }), className: 'w-full px-4 py-2 border border-purple-200 rounded-lg' }),
                        React.createElement('input', { type: 'time', value: eventForm.time, onChange: (e) => setEventForm({ ...eventForm, time: e.target.value }), className: 'w-full px-4 py-2 border border-purple-200 rounded-lg' }),
                        React.createElement('div', { className: 'space-y-2' },

                        )
                    )
                )
            )
        );

    const ShoppingTab = () => {

            activeTab === 'games' && React.createElement(GamesTab),
            activeTab === 'vacations' && React.createElement(VacationsTab),
            activeTab === 'search' && React.createElement(SearchTab)
        )
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(FamilyHub));
    </script>
